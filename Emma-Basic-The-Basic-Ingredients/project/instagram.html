<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>@emmabasiclondon " Emma Basic</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="components/tokens.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body style="overflow-x: hidden;">
<div id="root"></div>

<script type="text/babel" src="components/Placeholder.jsx"></script>
<script type="text/babel" src="components/motion.jsx"></script>
<script type="text/babel" src="components/TopNav.jsx?v=16"></script>
<script type="text/babel" src="components/PageHero.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script type="text/babel">

const JOURNAL_CATS = ["All", "Recipes", "Ingredient Stories", "Behind the Product", "The Grit"];

function InstagramPage() {
  return (
    <>
      <TopNav hasHero={false} />
      <main>
        <PageHero
          eyebrow="Field Notes"
          title="From the feed."
          titleItalic=""
          subtitle="What we're cooking, eating, and thinking about " as it happens."
        />

        {/* Category nav " matches Journal.html sticky bar */}
        <div style={{
          position: "sticky", top: 72, zIndex: 20,
          background: "rgba(246,246,246,0.92)",
          backdropFilter: "saturate(140%) blur(10px)",
          borderTop: "1px solid var(--rule)",
          borderBottom: "1px solid var(--rule)",
        }}>
          <div style={{
            maxWidth: "var(--maxw)", margin: "0 auto",
            padding: "14px var(--pad-x)",
            display: "flex", gap: "clamp(16px, 2.5vw, 28px)", alignItems: "center",
            overflowX: "auto", scrollbarWidth: "none",
          }}>
            {JOURNAL_CATS.map(cat => (
              <a key={cat} href="Journal.html" style={{
                fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "0.18em",
                textTransform: "uppercase",
                color: "var(--ink-60)",
                background: "none", border: "none", padding: "0 0 2px", cursor: "pointer",
                borderBottom: "1px solid transparent",
                textDecoration: "none",
                whiteSpace: "nowrap",
                transition: "color 200ms var(--ease-out)",
              }}
                onMouseEnter={e => e.currentTarget.style.color = "var(--ink)"}
                onMouseLeave={e => e.currentTarget.style.color = "var(--ink-60)"}
              >{cat}</a>
            ))}
            <span style={{
              fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "0.18em",
              textTransform: "uppercase", color: "var(--ink)",
              padding: "0 0 2px", borderBottom: "1px solid var(--ink)",
              whiteSpace: "nowrap",
            }}>Instagram</span>
          </div>
        </div>

        {/* Main content */}
        <section style={{ background: "var(--paper)", padding: "clamp(64px, 10vh, 120px) var(--pad-x) clamp(96px, 14vh, 160px)" }}>
          <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>

            {/* Header row */}
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "flex-end",
              flexWrap: "wrap", gap: 24,
              marginBottom: "clamp(48px, 6vh, 80px)",
              paddingBottom: "clamp(32px, 4vh, 48px)",
              borderBottom: "1px solid var(--rule)",
            }}>
              <div>
                <div style={{
                  fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "0.26em",
                  textTransform: "uppercase", color: "var(--ink-60)", marginBottom: 12,
                }}>Follow along</div>
                <h2 style={{
                  fontFamily: "var(--f-display)", fontWeight: 400,
                  fontSize: "clamp(40px, 6vw, 96px)",
                  lineHeight: 0.9, letterSpacing: "-0.03em", margin: 0,
                  fontVariationSettings: '"opsz" 144, "SOFT" 30',
                }}>@emmabasiclondon</h2>
              </div>
              <a
                href="https://www.instagram.com/emmabasiclondon/"
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "0.22em",
                  textTransform: "uppercase", color: "var(--ink)",
                  textDecoration: "none", borderBottom: "1px solid var(--ink)",
                  paddingBottom: 2, whiteSpace: "nowrap",
                  transition: "opacity 200ms var(--ease-out)",
                }}
                onMouseEnter={e => e.currentTarget.style.opacity = "0.5"}
                onMouseLeave={e => e.currentTarget.style.opacity = "1"}
              >
                Open Instagram →
              </a>
            </div>

            {/* Instagram embed */}
            <div style={{
              width: "100%",
              border: "1px solid var(--rule)",
              overflow: "hidden",
              minHeight: 600,
              display: "flex", alignItems: "center", justifyContent: "center",
              background: "var(--paper-shade)",
              position: "relative",
            }}>
              <iframe
                src="https://www.instagram.com/emmabasiclondon/embed"
                style={{
                  width: "100%",
                  minHeight: 700,
                  border: "none",
                  display: "block",
                }}
                allowTransparency="true"
                allowFullScreen
                title="Emma Basic London Instagram"
                scrolling="no"
              />
            </div>

            {/* Follow CTA */}
            <div style={{
              marginTop: "clamp(48px, 6vh, 80px)",
              padding: "clamp(40px, 5vw, 64px)",
              background: "var(--ink)", color: "var(--paper)",
              display: "flex", alignItems: "center", justifyContent: "space-between",
              flexWrap: "wrap", gap: 32,
            }}>
              <p style={{
                fontFamily: "var(--f-display)", fontWeight: 400,
                fontSize: "clamp(20px, 2.2vw, 32px)",
                lineHeight: 1.2, letterSpacing: "-0.02em", margin: 0,
                fontVariationSettings: '"opsz" 144, "SOFT" 20',
                maxWidth: "60ch",
              }}>
                Recipes, sourcing trips, long runs, and what's on the stove. All of it, unfiltered.
              </p>
              <a
                href="https://www.instagram.com/emmabasiclondon/"
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "0.22em",
                  textTransform: "uppercase", color: "var(--paper)",
                  textDecoration: "none", borderBottom: "1px solid rgba(246,246,246,0.4)",
                  paddingBottom: 2, whiteSpace: "nowrap",
                  flexShrink: 0,
                }}
              >
                Follow @emmabasiclondon →
              </a>
            </div>

          </div>
        </section>

      </main>
      <SiteFooter />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InstagramPage />);
</script>

<script type="text/babel" src="components/FeedbackPopup.jsx"></script>
</body>
</html>
