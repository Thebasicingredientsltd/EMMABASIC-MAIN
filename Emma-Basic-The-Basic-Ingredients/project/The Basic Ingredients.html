/* â"€â"€ Page Nav â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€ */
function TBIPageNav() {
  const links = [
    { label: "About",    href: "#about" },
    { label: "Services", href: "#services" },
    { label: "Trade",    href: "#trade" },
    { label: "Contact",  href: "#contact" },
  ];
  const [active, setActive] = React.useState(null);

  React.useEffect(() => {
    const ids = links.map(l => l.href.slice(1));
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin: "-40% 0px -55% 0px" });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return (
    <div style={{
      position: "fixed", top: 64, left: 0, right: 0, zIndex: 30,
      background: "rgba(246,246,246,0.95)",
      backdropFilter: "saturate(140%) blur(10px)",
      borderBottom: "1px solid var(--rule)",
    }}>
      <div style={{
        maxWidth: "var(--maxw)", margin: "0 auto",
        padding: "0 var(--pad-x)",
        display: "flex", gap: 0, overflowX: "auto",
        scrollbarWidth: "none",
      }}>
        {links.map(l => (
          <a key={l.href} href={l.href} style={{
            fontFamily: "var(--f-body)", fontWeight: 400,
            fontSize: 13, letterSpacing: "0.12em", textTransform: "uppercase",
            textDecoration: "none", whiteSpace: "nowrap",
            padding: "22px 20px 14px 0", marginRight: 20,
            color: active === l.href.slice(1) ? "var(--ink)" : "var(--ink-60)",
            borderBottom: active === l.href.slice(1) ? "2px solid var(--ink)" : "2px solid transparent",
            transition: "color 200ms var(--ease-out), border-color 200ms var(--ease-out)",
          }}>
            {l.label}
          </a>
        ))}
      </div>
      <style>{`.tbi-page-nav::-webkit-scrollbar { display: none; }`}</style>
    </div>
  );
}

/* â"€â"€ Cert Badge â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€ */
function CertBadge({ cert }) {
  const [imgFailed, setImgFailed] = React.useState(false);
  return (
    <div style={{
      display: "flex", alignItems: "center",
    }}>
      {!imgFailed ? (
        <img
          src={cert.imgSrc}
          alt={cert.alt}
          style={{ height: 52, width: "auto", display: "block" }}
          onError={() => setImgFailed(true)}
        />
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
          <span style={{ fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--ink)", fontWeight: 600 }}>{cert.label}</span>
          <span style={{ fontFamily: "var(--f-mono)", fontSize: 9.5, letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--ink-60)" }}>{cert.sublabel}</span>
        </div>
      )}
    </div>
  );
}
