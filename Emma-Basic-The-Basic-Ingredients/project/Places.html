<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="components/tokens.css"/>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  .eb-map-wrap .leaflet-control-attribution { display: none; }
  .eb-map-wrap .leaflet-control-zoom a {
    font-family: 'JetBrains Mono', monospace !important;
    color: #0A0A0A !important;
    border-color: rgba(10,10,10,0.15) !important;
  }
  .eb-map-wrap .leaflet-control-zoom {
    border: 1px solid rgba(10,10,10,0.15) !important;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12) !important;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body data-screen-label="Places">
<div id="root"></div>

<script type="text/babel" src="components/Placeholder.jsx"></script>
<script type="text/babel" src="components/motion.jsx"></script>
<script type="text/babel" src="components/TopNav.jsx?v=13"></script>
<script type="text/babel" src="components/PageHero.jsx"></script>
<script type="text/babel" src="components/SupplierMap.jsx?v=3"></script>
<script type="text/babel" src="components/StockistCarousel.jsx?v=8"></script>
<script type="text/babel" src="components/NearestShopFinder.jsx?v=4"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script type="text/babel">
function LocationMap() {
  const mapRef = React.useRef(null);
  const instanceRef = React.useRef(null);

  React.useEffect(() => {
    if (!mapRef.current || instanceRef.current) return;
    const LAT = 51.5016;
    const LNG = -0.0710;
    const isMobile = window.matchMedia("(max-width: 768px)").matches;
    const map = L.map(mapRef.current, {
      center: [LAT, LNG], zoom: 17, zoomControl: true,
      scrollWheelZoom: false, dragging: !isMobile, attributionControl: false,
    });
    instanceRef.current = map;
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19 }).addTo(map);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19, opacity: 0.85 }).addTo(map);
    const pinSvg = `<svg width="52" height="64" viewBox="0 0 52 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="26" cy="61" rx="9" ry="3" fill="rgba(0,0,0,0.25)"/>
      <path d="M26 2C15.5 2 7 10.5 7 21C7 34 26 60 26 60C26 60 45 34 45 21C45 10.5 36.5 2 26 2Z" fill="white" stroke="#0A0A0A" stroke-width="1.5"/>
      <circle cx="26" cy="21" r="12" fill="white" stroke="#0A0A0A" stroke-width="1.2"/>
      <text x="26" y="25.5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="500" letter-spacing="1" fill="#0A0A0A">HQ</text>
    </svg>`;
    const icon = L.divIcon({ html: pinSvg, iconSize: [52, 64], iconAnchor: [26, 62], className: "" });
    L.marker([LAT, LNG], { icon }).addTo(map);
    return () => { map.remove(); instanceRef.current = null; };
  }, []);

  return (
    <section style={{ background: "var(--paper)", padding: "clamp(64px, 10vh, 120px) 0 clamp(80px, 12vh, 160px)" }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "0 var(--pad-x)" }}>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "baseline",
          flexWrap: "wrap", gap: 16,
          paddingBottom: "clamp(24px, 3vh, 36px)",
          borderBottom: "1px solid var(--rule)",
          marginBottom: "clamp(24px, 3vh, 36px)",
        }}>
          <span style={{ fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.24em", textTransform: "uppercase", color: "var(--ink-60)" }}>London HQ</span>
          <address style={{ fontStyle: "normal", fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.14em", color: "var(--ink-60)", textAlign: "right" }}>
            4 New Concordia Wharf &middot; Mill Street &middot; London SE1 2BB
          </address>
        </div>
        <div className="eb-map-wrap" style={{ width: "100%", height: "clamp(360px, 50vw, 580px)", border: "1px solid var(--rule)", position: "relative" }}>
          <div ref={mapRef} style={{ width: "100%", height: "100%" }} />
          <div style={{ position: "absolute", bottom: 20, left: 20, zIndex: 1000, background: "white", border: "1px solid rgba(10,10,10,0.12)", padding: "14px 18px", boxShadow: "0 2px 16px rgba(0,0,0,0.14)", pointerEvents: "none", minWidth: 220 }}>
            <div style={{ fontFamily: "var(--f-mono)", fontSize: 9, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(10,10,10,0.45)", marginBottom: 8 }}>London HQ</div>
            <div style={{ fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.1em", color: "#0A0A0A", lineHeight: 1.6, marginBottom: 14 }}>
              4 New Concordia Wharf<br/>Mill Street, SE1 2BB
            </div>
            <div style={{ borderTop: "1px solid rgba(10,10,10,0.1)", paddingTop: 10, display: "grid", gap: 6 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 16 }}>
                <span style={{ fontFamily: "var(--f-mono)", fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(10,10,10,0.45)" }}>London Bridge</span>
                <span style={{ fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "0.1em", color: "#0A0A0A" }}>18 min walk</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 16 }}>
                <span style={{ fontFamily: "var(--f-mono)", fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(10,10,10,0.45)" }}>Bermondsey</span>
                <span style={{ fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "0.1em", color: "#0A0A0A" }}>12 min walk</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

const OSEYO_LOCATIONS = [
  { name: "Oseyo Wimbledon",       address: "Centre Court Shopping Centre, Wimbledon, SW19 8YE", mapsUrl: "https://maps.google.com/?q=Oseyo+Wimbledon+Centre+Court+Shopping+Centre" },
  { name: "Oseyo Covent Garden",   address: "27 Neal Street, London, WC2H 9PR",                  mapsUrl: "https://maps.google.com/?q=Oseyo+27+Neal+Street+Covent+Garden+London" },
  { name: "Oseyo King's Cross",    address: "Coal Drops Yard, London, N1C 4AB",                  mapsUrl: "https://maps.google.com/?q=Oseyo+Coal+Drops+Yard+Kings+Cross+London" },
  { name: "Oseyo Brighton",        address: "12 Duke Street, Brighton, BN1 1AH",                 mapsUrl: "https://maps.google.com/?q=Oseyo+12+Duke+Street+Brighton" },
  { name: "Oseyo Manchester",      address: "The Trafford Centre, Manchester, M17 8AA",          mapsUrl: "https://maps.google.com/?q=Oseyo+Trafford+Centre+Manchester" },
];

function OseyoSection() {
  return (
    <section style={{
      background: "var(--paper)",
      padding: "clamp(72px, 10vh, 120px) var(--pad-x)",
      borderTop: "1px solid var(--rule)",
    }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr",
          gap: "clamp(48px, 8vw, 120px)", alignItems: "start",
          marginBottom: "clamp(48px, 7vh, 72px)",
        }} className="oseyo-header-grid">
          <Reveal>
            <div>
              <h2 style={{
                fontFamily: "var(--f-display)", fontWeight: 400,
                fontSize: "clamp(40px, 5vw, 80px)",
                lineHeight: 1.0, letterSpacing: "-0.035em", margin: 0,
                fontVariationSettings: '"opsz" 144, "SOFT" 30',
              }}>
                Oseyo <em style={{ fontStyle: "normal", fontFamily: "var(--f-body)", fontWeight: 400, letterSpacing: "-0.02em" }}>stores.</em>
              </h2>
            </div>
          </Reveal>
          <Reveal delay={80}>
            <p style={{
              fontFamily: "var(--f-body)", fontSize: "clamp(16px, 1.3vw, 18px)",
              lineHeight: 1.72, margin: 0, color: "var(--ink-60)",
              paddingTop: 8,
            }}>
              Find Emma Basic at all Oseyo locations across the UK &mdash; the Korean lifestyle and grocery stores stocking our full range.
            </p>
          </Reveal>
        </div>

        <div style={{ borderTop: "1px solid var(--rule)" }}>
          {OSEYO_LOCATIONS.map((loc, i) => (
            <Reveal key={i} delay={i * 60}>
              <a href={loc.mapsUrl} target="_blank" rel="noopener noreferrer" style={{
                display: "grid", gridTemplateColumns: "1fr auto",
                alignItems: "center", gap: 24,
                padding: "22px 0",
                borderBottom: "1px solid var(--rule)",
                textDecoration: "none",
                color: "inherit",
              }}
                onMouseEnter={e => e.currentTarget.style.opacity = "0.7"}
                onMouseLeave={e => e.currentTarget.style.opacity = "1"}
              >
                <div>
                  <div style={{
                    fontFamily: "var(--f-display)", fontWeight: 400,
                    fontSize: "clamp(18px, 1.8vw, 24px)",
                    letterSpacing: "-0.02em", lineHeight: 1.2,
                    fontVariationSettings: '"opsz" 144, "SOFT" 20',
                    color: "var(--ink)", marginBottom: 4,
                  }}>{loc.name}</div>
                  <div style={{
                    fontFamily: "var(--f-body)", fontSize: 11,
                    letterSpacing: "0.16em", textTransform: "uppercase",
                    color: "var(--ink-60)",
                  }}>{loc.address}</div>
                </div>
                <span style={{
                  fontFamily: "var(--f-body)", fontSize: 11,
                  letterSpacing: "0.18em", textTransform: "uppercase",
                  color: "var(--ink-60)",
                  whiteSpace: "nowrap",
                }}>Map →</span>
              </a>
            </Reveal>
          ))}
        </div>
      </div>
      <style>{`@media (max-width: 768px) { .oseyo-header-grid { grid-template-columns: 1fr !important; } }`}</style>
    </section>
  );
}

function PlacesApp() {
  return (
    <>
      <TopNav hasHero={false} />
      <main>
        <PageHero
          eyebrow="Places"
          title="Where to find"
          titleItalic="our products."
          subtitle="Good shops, independent grocers, and department stores &mdash; stocking Emma Basic near you."
        />
        <StockistCarousel />
        <SupplierMap />
        <NearestShopFinder />
        <LocationMap />
      </main>
      <SiteFooter />
    </>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PlacesApp />);
</script>

</body>
</html>
