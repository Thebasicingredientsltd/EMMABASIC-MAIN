<script type="text/babel">

// CMS-managed content (data/people.js?v=20260717182358917). Each section falls back to its
// built-in copy so the page still renders if the data file is missing.
const EB_PEOPLE = window.EB_PEOPLE || {};

const PAGE_SECTIONS = [
  { label: "Emma Basic",           href: "#team" },
  { label: "The Basic Ingredients", href: "#about" },
  { label: "Services",             href: "#services" },
  { label: "Trade",                href: "#trade" },
  { label: "Contact",              href: "#contact" },
];

function PeopleSubNav() {
  const [active, setActive] = React.useState(null);

  React.useEffect(() => {
    const ids = PAGE_SECTIONS.map(s => s.href.slice(1));
    const observers = ids.map(id => {
      const el = document.getElementById(id);
      if (!el) return null;
      const obs = new IntersectionObserver(
        ([entry]) => { if (entry.isIntersecting) setActive(id); },
        { rootMargin: "-30% 0px -60% 0px" }
      );
      obs.observe(el);
      return obs;
    });
    return () => observers.forEach(o => o && o.disconnect());
  }, []);

  const handleClick = (e, href) => {
    e.preventDefault();
    const id = href.slice(1);
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 130;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  };

  return (
    <div style={{
      position: "sticky", top: 72, zIndex: 20,
      background: "rgba(246,246,246,0.92)",
      backdropFilter: "saturate(140%) blur(10px)",
      borderTop: "1px solid var(--rule)",
      borderBottom: "1px solid var(--rule)",
    }}>
      <div style={{
        maxWidth: "var(--maxw)", margin: "0 auto",
        padding: "14px var(--pad-x)",
        display: "flex", gap: "clamp(16px, 2.5vw, 32px)", alignItems: "center",
        overflowX: "auto", scrollbarWidth: "none",
      }}>
        {PAGE_SECTIONS.map(s => {
          const id = s.href.slice(1);
          const isActive = active === id;
          return (
            <a key={s.href} href={s.href} onClick={e => handleClick(e, s.href)} style={{
              fontFamily: "var(--f-body)", fontSize: 11, letterSpacing: "0.18em",
              textTransform: "uppercase",
              color: isActive ? "var(--ink)" : "var(--ink-60)",
              textDecoration: "none",
              borderBottom: isActive ? "1px solid var(--ink)" : "1px solid transparent",
              paddingBottom: 2,
              whiteSpace: "nowrap",
              transition: "color 200ms var(--ease-out), border-color 200ms var(--ease-out)",
            }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.color = "var(--ink)"; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.color = "var(--ink-60)"; }}
            >{s.label}</a>
          );
        })}
      </div>
    </div>
  );
}



function TBIIntroSection() {
  const d = EB_PEOPLE.intro || {};
  const heading = d.heading || "Who we";
  const headingAccent = d.headingAccent || "are.";
  const paragraphs = (d.paragraphs && d.paragraphs.length) ? d.paragraphs : [
    "The Basic Ingredients Ltd is a BRCGS-certified Grade AA food company specialising in clean-label products. Often called Clean Dec among food technologists, clean label is a familiar phrase to consumers. What is clean label? It simply means products are made without additives.",
    "What are food additives? Food additives are substances added to enhance flavour, colour, shelf life, or texture. While thousands are legally permitted and regulated by authorities, are they good for your well-being? Probably not! Here are a few common examples: Emulsifier E471 in most ice-cream brands; Brilliant Blue E133 as colouring and Xanthan Gum E415 as thickener in wasabi paste; Aspartame E951 as sweetener in Diet Cola.",
    "Emma Basic is a clean-label brand and registered trademark, proudly owned by The Basic Ingredients Ltd. At Emma Basic, we go further than just removing additives — when developing a product we eliminate UPFs like refined oils, reduce plastic in packaging, and allow only a minimal number of ingredients that are nourishing and natural, to support real well-being.",
  ];
  return (
    <section id="about" style={{
      background: "var(--paper)", color: "var(--ink)",
      padding: "clamp(80px, 12vw, 160px) var(--pad-x)",
      borderBottom: "1px solid var(--rule)",
    }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr",
          gap: "clamp(48px, 8vw, 120px)", alignItems: "start",
        }} className="tbi-intro-grid">
          <div>
            <Reveal>
              <h2 style={{
                fontFamily: "var(--f-display)", fontWeight: 400,
                fontSize: "clamp(36px, 4.5vw, 72px)",
                lineHeight: 1.0, letterSpacing: "-0.035em", margin: 0,
                fontVariationSettings: '"opsz" 144, "SOFT" 20', whiteSpace: "nowrap",
              }}>
                {heading} <em style={{ fontStyle: "normal", fontFamily: "var(--f-body)", fontWeight: 400, letterSpacing: "-0.02em" }}>{headingAccent}</em>
              </h2>
            </Reveal>
          </div>
          <div>
            {paragraphs.map((text, i) => (
              <Reveal key={i} delay={80 + i * 40}>
                <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(17px, 1.35vw, 19px)", lineHeight: 1.72, margin: i === paragraphs.length - 1 ? 0 : "0 0 24px", color: "var(--ink-90)" }}>
                  {text}
                </p>
              </Reveal>
            ))}
          </div>
        </div>
      </div>
      <style>{`@media (max-width: 768px) { .tbi-intro-grid { grid-template-columns: 1fr !important; } }`}</style>
    </section>
  );
}

function TBIServicesSection() {
  const d = EB_PEOPLE.services || {};
  const eyebrow = d.eyebrow || "What we offer";
  const heading = d.heading || "Export, import, and OEM.";
  const cards = (d.cards && d.cards.length) ? d.cards : [
    { title: "Export", body: "We specialise in export to China, Taiwan, Japan and Europe." },
    { title: "Import", body: "We import from the EU, Vietnam, Taiwan, China, Japan." },
    { title: "OEM",    body: "We are your NPD, technical and procurement team to create products under your brand." },
  ];
  const closing = d.closing || "We provide advice on food safety, legality, authenticity and quality. If you are a food & drink brand looking for export opportunities, you can rely on us at all stages — from labelling assessment to customs clearance.";
  return (
    <section id="services" style={{
      background: "var(--paper)", padding: "clamp(80px, 12vw, 160px) var(--pad-x)",
      borderTop: "1px solid var(--rule)",
    }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
        <Reveal>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "baseline",
            flexWrap: "wrap", gap: 16, borderBottom: "1px solid var(--rule)",
            paddingBottom: "clamp(24px, 3vh, 36px)", marginBottom: "clamp(48px, 7vh, 80px)",
          }}>
            <span style={{ fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.24em", textTransform: "uppercase", color: "var(--ink-60)" }}>{eyebrow}</span>
          </div>
        </Reveal>
        <Reveal delay={60}>
          <h2 style={{
            fontFamily: "var(--f-display)", fontWeight: 400, fontSize: "clamp(36px, 4.5vw, 72px)",
            lineHeight: 1.0, letterSpacing: "-0.035em", margin: "0 0 clamp(48px, 7vh, 80px)",
            fontVariationSettings: '"opsz" 144, "SOFT" 20',
          }}>{heading}</h2>
        </Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "clamp(16px, 2vw, 24px)", marginBottom: "clamp(48px, 7vh, 80px)" }} className="tbi-services-grid">
          {cards.map((c, i) => (
            <Reveal key={i} delay={i * 80}>
              <div style={{ border: "1px solid var(--rule)", padding: "clamp(28px, 3.5vw, 44px)", display: "flex", flexDirection: "column", gap: 20 }}>
                <span style={{ fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "0.24em", textTransform: "uppercase", color: "var(--ink-60)" }}>0{i + 1}</span>
                <h3 style={{ fontFamily: "var(--f-display)", fontWeight: 400, fontSize: "clamp(22px, 2vw, 32px)", lineHeight: 1.1, letterSpacing: "-0.025em", margin: 0, fontVariationSettings: '"opsz" 36, "SOFT" 10' }}>{c.title}</h3>
                <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(16px, 1.3vw, 18px)", lineHeight: 1.68, margin: 0, color: "var(--ink-60)" }}>{c.body}</p>
              </div>
            </Reveal>
          ))}
        </div>
        <Reveal delay={120}>
          <div style={{ borderTop: "1px solid var(--rule)", paddingTop: "clamp(36px, 5vh, 56px)" }}>
            <p style={{ fontFamily: "var(--f-display)", fontStyle: "italic", fontSize: "clamp(18px, 1.8vw, 26px)", lineHeight: 1.55, margin: 0, fontVariationSettings: '"opsz" 28, "SOFT" 30', color: "var(--ink-90)", maxWidth: "72ch" }}>
              {closing}
            </p>
          </div>
        </Reveal>
      </div>
      <style>{`
        @media (max-width: 900px) { .tbi-services-grid { grid-template-columns: 1fr 1fr !important; } }
        @media (max-width: 560px) { .tbi-services-grid { grid-template-columns: 1fr !important; } }
      `}</style>
    </section>
  );
}

function TBIOrderSection() {
  const [open, setOpen] = React.useState(null);
  const d = EB_PEOPLE.trade || {};
  const eyebrow = d.eyebrow || "For trade customers";
  const heading = d.heading || "How to order.";
  const intro = d.intro || "All orders are subject to account approval. Get in touch to open a trade account and start ordering.";
  const items = (d.items && d.items.length) ? d.items : [
    { q: "Open a trade account", a: "Two payment terms depending on your CreditSafe rating: Cash in Advance or Net 30 Days Credit.", forms: [
      { label: "Cash in Advance - Application Form", href: "assets/forms/The Basic - Cash Advance Account updated.pdf" },
      { label: "Net 30 Days Credit - Application Form", href: "assets/forms/The Basic - Account Application Form updated.pdf" },
    ]},
    { q: "Order schedule", a: "Place your order by 10:00 AM on Day 1 for Day 3 delivery. Email boris@thebasicingredients.com with the product code, product name, and quantity required." },
    { q: "Minimum order", a: "Minimum order value is assessed case by case, based on your delivery distance and estimated volume. Get in touch with your address and an idea of what you need and we will come back to you with a figure." },
    { q: "Collection - Ambient", a: "Kinaxia Logistics, DC115, Danes Way, Dirft, Crick, NN6 7GZ. Monday to Friday, 07:00-20:00." },
    { q: "Collection - Frozen", a: "JS Davidson Ltd, Shrewsbury Avenue, Woodston Industrial Estate, Peterborough, PE2 7LB. Monday to Friday, 06:00-15:00." },
    { q: "Use your existing distributor", a: "If you prefer to use your favourite distributor then please put us in touch, we will gladly make contact." },
  ];
  return (
    <section id="trade" style={{ background: "var(--paper-shade)", borderTop: "1px solid var(--rule)", padding: "clamp(80px, 12vw, 160px) var(--pad-x)" }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(32px, 6vw, 96px)", marginBottom: "clamp(48px, 7vh, 80px)", alignItems: "end" }} className="tbi-order-header">
          <Reveal>
            <div>
              <span style={{ fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.24em", textTransform: "uppercase", color: "var(--ink-60)", display: "block", marginBottom: 20 }}>{eyebrow}</span>
              <h2 style={{ fontFamily: "var(--f-display)", fontWeight: 400, fontSize: "clamp(36px, 4.5vw, 72px)", lineHeight: 1.0, letterSpacing: "-0.035em", margin: 0, fontVariationSettings: '"opsz" 144, "SOFT" 20' }}>{heading}</h2>
            </div>
          </Reveal>
          <Reveal delay={100}>
            <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(16px, 1.3vw, 18px)", lineHeight: 1.72, margin: 0, color: "var(--ink-60)" }}>
              {intro}
            </p>
          </Reveal>
        </div>
        <div style={{ borderTop: "1px solid var(--rule)" }}>
          {items.map((item, i) => (
            <Reveal key={i} delay={i * 50}>
              <div style={{ borderBottom: "1px solid var(--rule)" }}>
                <button onClick={() => setOpen(open === i ? null : i)} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 24, padding: "22px 0", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                  <span style={{ fontFamily: "var(--f-body)", fontWeight: 400, fontSize: "clamp(17px, 1.3vw, 19px)", color: "var(--ink)", lineHeight: 1.4 }}>{item.q}</span>
                  <span style={{ fontFamily: "var(--f-mono)", fontSize: 16, color: "var(--ink-60)", flexShrink: 0, transform: open === i ? "rotate(45deg)" : "rotate(0deg)", transition: "transform 300ms var(--ease-out)", display: "inline-block" }}>+</span>
                </button>
                <div style={{ overflow: "hidden", maxHeight: open === i ? 600 : 0, transition: "max-height 400ms var(--ease-out)" }}>
                  <p style={{ fontFamily: "var(--f-body)", fontWeight: 400, fontSize: "clamp(17px, 1.3vw, 19px)", lineHeight: 1.65, color: "var(--ink-90)", margin: "0 0 28px" }}>{item.a}</p>
                  {item.forms && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 28 }}>
                      {item.forms.map(f => (
                        <a key={f.label} href={f.href} download style={{ display: "inline-flex", alignItems: "center", gap: 10, fontFamily: "var(--f-mono)", fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", textDecoration: "none", color: "var(--ink)", border: "1px solid var(--rule)", padding: "12px 20px", width: "fit-content", transition: "background 180ms var(--ease-out)" }}
                          onMouseEnter={e => e.currentTarget.style.background = "var(--paper-shade)"}
                          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                          {f.label}
                        </a>
                      ))}
                      <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(13px, 1vw, 14px)", lineHeight: 1.6, margin: "4px 0 0", color: "var(--ink-60)" }}>
                        Please contact <a href="mailto:boris@thebasicingredients.com" style={{ color: "var(--ink)", textDecoration: "underline" }}>boris@thebasicingredients.com</a> to open your account.
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </div>
      <style>{`@media (max-width: 768px) { .tbi-order-header { grid-template-columns: 1fr !important; } }`}</style>
    </section>
  );
}

function TBIContactSection() {
  const d = EB_PEOPLE.contact || {};
  const headingLine1 = d.headingLine1 || "Discuss your";
  const headingLine2 = d.headingLine2 || "needs with us.";
  const body = d.body || "We provide advice on food safety, legality, authenticity and quality. If you are a food & drink brand looking for export opportunities, you can rely on us at all stages — from labelling assessment to customs clearance.";
  const regionLabel = d.regionLabel || "United Kingdom";
  const addressLine1 = d.addressLine1 || "Unit 4, New Concordia Wharf";
  const addressLine2 = d.addressLine2 || "London, SE1 2BB";
  const email = d.email || "boris@thebasicingredients.com";
  const note = d.note || "For trade enquiries, export opportunities, and OEM partnerships.";
  return (
    <section id="contact" style={{ background: "var(--ink)", color: "var(--paper)", padding: "clamp(80px, 12vw, 160px) var(--pad-x)" }}>
      <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(48px, 8vw, 120px)", alignItems: "start" }} className="tbi-contact-grid">
          <div>
            <Reveal delay={60}>
              <h2 style={{ fontFamily: "var(--f-display)", fontWeight: 400, fontSize: "clamp(40px, 5vw, 80px)", lineHeight: 1.0, letterSpacing: "-0.035em", margin: "0 0 clamp(24px, 3vh, 36px)", fontVariationSettings: '"opsz" 144, "SOFT" 30', color: "var(--paper)" }}>
                {headingLine1}<br/>
                <em style={{ fontStyle: "normal", fontFamily: "var(--f-body)", fontWeight: 400, letterSpacing: "-0.02em" }}>{headingLine2}</em>
              </h2>
            </Reveal>
            <Reveal delay={100}>
              <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(17px, 1.3vw, 19px)", lineHeight: 1.72, color: "rgba(246,246,246,0.78)", margin: "0 0 clamp(40px, 6vh, 64px)" }}>
                {body}
              </p>
            </Reveal>
            <Reveal delay={120}>
              <div>
                <div style={{ fontFamily: "var(--f-mono)", fontSize: 9.5, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(246,246,246,0.4)", marginBottom: 14 }}>{regionLabel}</div>
                <address style={{ fontStyle: "normal", fontFamily: "var(--f-display)", fontSize: "clamp(14px, 1.1vw, 16px)", lineHeight: 1.75, color: "rgba(246,246,246,0.78)", fontVariationSettings: '"opsz" 16, "SOFT" 20' }}>
                  {addressLine1}<br/>{addressLine2}
                </address>
              </div>
            </Reveal>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "clamp(28px, 4vh, 40px)" }}>
            <Reveal delay={140}>
              <div>
                <div style={{ fontFamily: "var(--f-mono)", fontSize: 9.5, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(246,246,246,0.4)", marginBottom: 16 }}>Email</div>
                <a href={"mailto:" + email} style={{ display: "inline-block", fontFamily: "var(--f-mono)", fontSize: "clamp(12px, 1vw, 14px)", letterSpacing: "0.08em", color: "var(--paper)", textDecoration: "none", border: "1px solid rgba(246,246,246,0.35)", padding: "14px 24px", transition: "border-color 200ms var(--ease-out), background 200ms var(--ease-out)" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(246,246,246,0.7)"; e.currentTarget.style.background = "rgba(246,246,246,0.06)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(246,246,246,0.35)"; e.currentTarget.style.background = "transparent"; }}>
                  {email}
                </a>
              </div>
            </Reveal>
            <Reveal delay={200}>
              <p style={{ fontFamily: "var(--f-body)", fontSize: "clamp(13px, 1vw, 14px)", lineHeight: 1.6, margin: 0, color: "rgba(246,246,246,0.4)" }}>
                {note}
              </p>
            </Reveal>
          </div>
        </div>
      </div>
      <style>{`@media (max-width: 768px) { .tbi-contact-grid { grid-template-columns: 1fr !important; } }`}</style>
    </section>
  );
}

function PeopleApp() {
  const hero = EB_PEOPLE.hero || {};
  return (
    <>
      <TopNav hasHero={false} />
      <main>
        <PageHero
          eyebrow={hero.eyebrow || "People"}
          title={hero.title || "A small operation,"}
          titleItalic={hero.titleItalic || "by design."}
          subtitle={hero.subtitle || "Carefully sourced, carefully run — twelve of us behind every decision."}
        />
        <PeopleSubNav />
        <FounderNarrative hideReadMore />
        <div id="team"><TeamGrid /></div>
        <TBIIntroSection />
        <TBIServicesSection />
        <TBIOrderSection />
        <TBIContactSection />
      </main>
      <SiteFooter />
    </>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PeopleApp />);
</script>
