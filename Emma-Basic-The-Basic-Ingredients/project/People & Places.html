<script type="text/babel">

const PAGE_SECTIONS = [
  { label: "Emma Basic",           href: "#team" },
  { label: "The Basic Ingredients", href: "#about" },
  { label: "Services",             href: "#services" },
  { label: "Trade",                href: "#trade" },
  { label: "Contact",              href: "#contact" },
];

function PeopleSubNav() {
  const [active, setActive] = React.useState(null);

  React.useEffect(() => {
    const ids = PAGE_SECTIONS.map(s => s.href.slice(1));
    const observers = ids.map(id => {
      const el = document.getElementById(id);
      if (!el) return null;
      const obs = new IntersectionObserver(
        ([entry]) => { if (entry.isIntersecting) setActive(id); },
        { rootMargin: "-30% 0px -60% 0px" }
      );
      obs.observe(el);
      return obs;
    });
    return () => observers.forEach(o => o && o.disconnect());
  }, []);

  const handleClick = (e, href) => {
    e.preventDefault();
    const id = href.slice(1);
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 130;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  };

  return (
    <div style={{
      position: "sticky", top: 72, zIndex: 20,
      background: "rgba(246,246,246,0.92)",
      backdropFilter: "saturate(140%) blur(10px)",
      borderTop: "1px solid var(--rule)",
      borderBottom: "1px solid var(--rule)",
    }}>
      <div style={{
        maxWidth: "var(--maxw)", margin: "0 auto",
        padding: "14px var(--pad-x)",
        display: "flex", gap: "clamp(16px, 2.5vw, 32px)", alignItems: "center",
        overflowX: "auto", scrollbarWidth: "none",
      }}>
        {PAGE_SECTIONS.map(s => {
          const id = s.href.slice(1);
          const isActive = active === id;
          return (
            <a key={s.href} href={s.href} onClick={e => handleClick(e, s.href)} style={{
              fontFamily: "var(--f-body)", fontSize: 11, letterSpacing: "0.18em",
              textTransform: "uppercase",
              color: isActive ? "var(--ink)" : "var(--ink-60)",
              textDecoration: "none",
              borderBottom: isActive ? "1px solid var(--ink)" : "1px solid transparent",
              paddingBottom: 2,
              whiteSpace: "nowrap",
              transition: "color 200ms var(--ease-out), border-color 200ms var(--ease-out)",
            }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.color = "var(--ink)"; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.color = "var(--ink-60)"; }}
            >{s.label}</a>
          );
        })}
      </div>
    </div>
  );
}

            <Reveal delay={120}>

              </p>
            </Reveal>
            <Reveal delay={160}>

      </div>
      <style>{`@media (max-width: 768px) { .tbi-intro-grid { grid-template-columns: 1fr !important; } }`}</style>

  );
}
